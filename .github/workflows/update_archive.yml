name: Build Digital Archive Databases

on:
  push:
    paths:
      - 'data/selim_transcriptions/**.json'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build-dbs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          # This ensures the bot has permission to push back to the repo
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          # We install these here because the Action server has 7GB of RAM,
          # unlike the Streamlit server which only has 1GB.
          pip install chromadb numpy<2.0.0 

      - name: Run Database Ingestion
        run: python build_db.py

      - name: Commit and Push Updated Databases
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Force add both the SQLite file and the entire ChromaDB folder
          git add data/archive_database.db
          git add data/chroma_db/ || true
          
          # The "|| echo" prevents the Action from failing if nothing changed
          git commit -m "Auto-update databases with new archive files" || echo "No changes to commit"
          git push
