name: Build Digital Archive Databases

on:
  push:
    paths:
      - 'data/selim_transcriptions/**.json'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build-dbs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # We force numpy < 2.0.0 here to keep ChromaDB happy in 2026
          pip install "chromadb>=0.4.0" "numpy<2.0.0" pysqlite3-binary Pillow openai

      - name: Run Database Ingestion
        run: python build_db.py

      - name: Commit and Push Updated Databases
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage the SQLite file and the entire Chroma folder
          git add data/archive_database.db
          git add data/chroma_db/ || true
          
          # Commit only if there are changes; push to the repo
          git commit -m "Auto-update databases" || echo "No changes to commit"
          git push
