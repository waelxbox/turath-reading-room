name: Build Digital Archive Databases

on:
  push:
    paths:
      - 'data/selim_transcriptions/**.json'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build-dbs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            "chromadb==0.4.24" \
            "numpy<2.0.0" \
            "pysqlite3-binary" \
            "Pillow>=9.0.0" \
            "openai" \
            "streamlit>=1.20.0"

      - name: Run Database Ingestion
        run: python build_db.py

      - name: Commit and Push Updated Databases
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage the SQLite file and the entire Chroma folder
          git add data/archive_database.db
          git add data/chroma_db/ || true
          
          # Commit only if there are changes; push to the repo
          git commit -m "Auto-update databases" || echo "No changes to commit"
          git push
